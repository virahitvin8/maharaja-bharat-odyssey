<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <linearGradient id="ruby" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#cc2233"/>
    </linearGradient>
  </defs>
  <!-- Crown base -->
  <path d="M 10 60 L 15 25 L 35 45 L 50 15 L 65 45 L 85 25 L 90 60 Z" fill="url(#gold)" stroke="#B8860B" stroke-width="2"/>
  <!-- Crown band -->
  <rect x="10" y="55" width="80" height="12" rx="3" fill="url(#gold)" stroke="#B8860B" stroke-width="1.5"/>
  <!-- Ruby jewel -->
  <circle cx="50" cy="48" r="6" fill="url(#ruby)" stroke="#aa1122" stroke-width="1"/>
  <!-- Side jewels -->
  <circle cx="30" cy="50" r="3.5" fill="#457b9d" stroke="#2a5a7a" stroke-width="1"/>
  <circle cx="70" cy="50" r="3.5" fill="#2d6a4f" stroke="#1a4a35" stroke-width="1"/>
  <!-- Crown points decoration -->
  <circle cx="15" cy="32" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
  <circle cx="85" cy="32" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
  <circle cx="35" cy="45" r="2.5" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
  <circle cx="65" cy="45" r="2.5" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
</svg>
