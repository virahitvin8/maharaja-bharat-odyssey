name: Build and Release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Web App (Vite)
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon

      - name: Get current date for release tag
        id: date
        run: echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ steps.date.outputs.date }}
          name: Maharaja's Bharat Odyssey Release ${{ steps.date.outputs.date }}
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## Maharaja's Bharat Odyssey
            Download the `app-debug.apk` below and install it on your Android device.
            
            - Built automatically by GitHub Actions.
            - Includes latest updates and new icons.
