<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#FF9933"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="crown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5E0"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  <!-- Bright orange gradient background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="256" cy="256" r="180" fill="rgba(255,255,255,0.1)"/>
  <circle cx="256" cy="256" r="140" fill="rgba(255,255,255,0.08)"/>
  <!-- Crown -->
  <g transform="translate(256, 140)">
    <path d="M-60,50 L-80,-20 L-30,10 L0,-40 L30,10 L80,-20 L60,50 Z" fill="url(#crown)" stroke="#FF8C00" stroke-width="3"/>
    <!-- Crown jewels -->
    <circle cx="-55" cy="-5" r="6" fill="#FF4444"/>
    <circle cx="0" cy="-25" r="7" fill="#4488FF"/>
    <circle cx="55" cy="-5" r="6" fill="#44FF88"/>
  </g>
  <!-- Stars around crown -->
  <text x="140" y="130" font-size="30" fill="rgba(255,255,255,0.7)">⭐</text>
  <text x="340" y="100" font-size="24" fill="rgba(255,255,255,0.6)">✨</text>
  <text x="380" y="180" font-size="20" fill="rgba(255,255,255,0.5)">🌟</text>
  <text x="100" y="200" font-size="22" fill="rgba(255,255,255,0.5)">⭐</text>
  <!-- Character face -->
  <g transform="translate(256, 270)">
    <!-- Head -->
    <circle cx="0" cy="0" r="50" fill="#FFD5A0" stroke="#E8A86A" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="-18" cy="-10" r="10" fill="white"/>
    <circle cx="18" cy="-10" r="10" fill="white"/>
    <circle cx="-16" cy="-8" r="6" fill="#2A1A00"/>
    <circle cx="16" cy="-8" r="6" fill="#2A1A00"/>
    <!-- Eye shine -->
    <circle cx="-14" cy="-11" r="2.5" fill="white"/>
    <circle cx="18" cy="-11" r="2.5" fill="white"/>
    <!-- Happy smile -->
    <path d="M-20,12 Q0,35 20,12" fill="none" stroke="#CC4444" stroke-width="3" stroke-linecap="round"/>
    <!-- Turban -->
    <rect x="-45" y="-70" width="90" height="35" rx="10" fill="#003366"/>
    <rect x="-40" y="-78" width="80" height="12" rx="6" fill="#002255"/>
    <!-- Turban jewel -->
    <circle cx="0" cy="-62" r="8" fill="#FF4444" stroke="#FFD700" stroke-width="2"/>
    <!-- Feather -->
    <path d="M15,-75 Q25,-100 20,-120" fill="none" stroke="#138808" stroke-width="3" stroke-linecap="round"/>
    <path d="M15,-75 Q30,-95 25,-115" fill="#138808" stroke="#138808" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- App Name -->
  <text x="256" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="52" fill="url(#text)" stroke="rgba(0,0,0,0.2)" stroke-width="1">MAHABHA</text>
  <text x="256" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="rgba(255,255,255,0.8)">✨ India Adventure ✨</text>
</svg>
