<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#0d0221"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="jewelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <linearGradient id="featherGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#138808"/>
      <stop offset="100%" style="stop-color:#0a5a00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>

  <!-- Deep royal purple background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>

  <!-- Decorative gold ring -->
  <circle cx="256" cy="240" r="170" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="240" r="160" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.15"/>

  <!-- ORNATE CROWN -->
  <g transform="translate(256, 100)">
    <!-- Crown base band -->
    <rect x="-70" y="30" width="140" height="12" rx="4" fill="url(#goldGrad)" filter="url(#shadow)"/>
    <!-- Crown arches -->
    <path d="M-60,35 L-70,-10 L-40,10 L-20,-5 L0,-25 L20,-5 L40,10 L70,-10 L60,35 Z"
          fill="url(#goldGrad)" stroke="#B8860B" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- Crown jewels on top points -->
    <circle cx="-55" cy="-8" r="6" fill="url(#jewelGrad)" stroke="#FFD700" stroke-width="1.5"/>
    <circle cx="0" cy="-23" r="7" fill="#4488FF" stroke="#FFD700" stroke-width="1.5"/>
    <circle cx="55" cy="-8" r="6" fill="#44FF88" stroke="#FFD700" stroke-width="1.5"/>
    <!-- Crown base jewels -->
    <circle cx="-35" cy="36" r="4" fill="#4488FF" stroke="#FFD700" stroke-width="1"/>
    <circle cx="0" cy="36" r="4" fill="url(#jewelGrad)" stroke="#FFD700" stroke-width="1"/>
    <circle cx="35" cy="36" r="4" fill="#44FF88" stroke="#FFD700" stroke-width="1"/>
    <!-- Crown details -->
    <path d="M-40,15 Q-20,5 0,15 Q20,5 40,15" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- ROYAL SWORD (vertical, behind the main elements) -->
  <g transform="translate(196, 260)" opacity="0.4">
    <rect x="-3" y="-40" width="6" height="80" rx="2" fill="#c0c0c0" stroke="#aaa" stroke-width="1"/>
    <rect x="-6" y="-28" width="12" height="4" rx="1" fill="url(#goldGrad)"/>
    <rect x="-8" y="40" width="16" height="6" rx="2" fill="url(#goldGrad)"/>
    <polygon points="0,-48 -4,-40 4,-40" fill="#e0e0e0"/>
  </g>

  <!-- ROYAL SCEPTRE (vertical, behind the main elements) -->
  <g transform="translate(316, 260)" opacity="0.4">
    <rect x="-3" y="-40" width="6" height="80" rx="2" fill="#c0c0c0" stroke="#aaa" stroke-width="1"/>
    <circle cx="0" cy="-34" r="8" fill="url(#goldGrad)" stroke="#FFD700" stroke-width="1"/>
    <circle cx="0" cy="-34" r="4" fill="url(#jewelGrad)"/>
  </g>

  <!-- CENTRAL EMBLEM - Lotus with temple spire -->
  <g transform="translate(256, 250)">
    <!-- Temple spire (shikhara) -->
    <path d="M-20,20 L-25,-10 L-15,-20 L0,-40 L15,-20 L25,-10 L20,20 Z"
          fill="url(#goldGrad)" stroke="#B8860B" stroke-width="1" filter="url(#shadow)"/>
    <!-- Temple dome -->
    <path d="M-18,-5 Q-12,-15 0,-18 Q12,-15 18,-5" fill="none" stroke="#FFD700" stroke-width="1.5"/>
    <!-- Temple door -->
    <rect x="-6" y="5" width="12" height="15" rx="6" fill="#0d0221" stroke="#FFD700" stroke-width="1"/>
    <!-- Lotus petals around temple -->
    <ellipse cx="-22" cy="25" rx="8" ry="14" fill="url(#goldGrad)" opacity="0.6" transform="rotate(-20, -22, 25)"/>
    <ellipse cx="22" cy="25" rx="8" ry="14" fill="url(#goldGrad)" opacity="0.6" transform="rotate(20, 22, 25)"/>
    <ellipse cx="-12" cy="30" rx="7" ry="12" fill="url(#goldGrad)" opacity="0.5" transform="rotate(-10, -12, 30)"/>
    <ellipse cx="12" cy="30" rx="7" ry="12" fill="url(#goldGrad)" opacity="0.5" transform="rotate(10, 12, 30)"/>
    <!-- Central lotus -->
    <ellipse cx="0" cy="28" rx="6" ry="10" fill="#FFD700" opacity="0.8"/>
  </g>

  <!-- DECORATIVE ELEMENTS -->
  <!-- Left ornamental pattern -->
  <g transform="translate(100, 250)" opacity="0.6">
    <path d="M0,0 Q-15,-15 0,-30 Q15,-15 0,0" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <path d="M0,5 Q-10,-8 0,-20 Q10,-8 0,5" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Right ornamental pattern -->
  <g transform="translate(412, 250)" opacity="0.6">
    <path d="M0,0 Q15,-15 0,-30 Q-15,-15 0,0" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <path d="M0,5 Q10,-8 0,-20 Q-10,-8 0,5" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Small decorative diamonds -->
  <rect x="140" y="170" width="6" height="6" rx="1" fill="#FFD700" opacity="0.4" transform="rotate(45, 143, 173)"/>
  <rect x="366" y="170" width="6" height="6" rx="1" fill="#FFD700" opacity="0.4" transform="rotate(45, 369, 173)"/>
  <rect x="140" y="300" width="6" height="6" rx="1" fill="#FFD700" opacity="0.4" transform="rotate(45, 143, 303)"/>
  <rect x="366" y="300" width="6" height="6" rx="1" fill="#FFD700" opacity="0.4" transform="rotate(45, 369, 303)"/>

  <!-- APP NAME -->
  <text x="256" y="410" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="bold" font-size="48"
        fill="url(#goldGrad)"
        stroke="#000" stroke-width="1"
        filter="url(#glow)"
        letter-spacing="4">RAJYATRA</text>

  <!-- Subtitle -->
  <text x="256" y="445" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="16"
        fill="#B8860B" opacity="0.8"
        letter-spacing="6">THE ROYAL JOURNEY</text>

  <!-- Decorative line under title -->
  <line x1="160" y1="420" x2="352" y2="420" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.4"/>
</svg>
